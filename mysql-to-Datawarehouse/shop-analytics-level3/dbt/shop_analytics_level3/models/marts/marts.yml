version: 2

models:
  - name: dim_customers
    description: "Customer dimension at one row per customer."
    columns:
      - name: customer_key
        data_tests:
          - not_null
          - unique
      - name: customer_id
        data_tests:
          - not_null
          - unique
      - name: full_name
        data_tests:
          - not_null
      - name: email
        data_tests:
          - not_null

  - name: dim_products
    description: "Product dimension enriched with category."
    columns:
      - name: product_key
        data_tests:
          - not_null
          - unique
      - name: product_id
        data_tests:
          - not_null
          - unique
      - name: category_id
        data_tests:
          - not_null
      - name: product_name
        data_tests:
          - not_null
      - name: price
        data_tests:
          - not_null

  - name: dim_dates
    description: "Date dimension generated from distinct order dates."
    columns:
      - name: date_key
        data_tests:
          - not_null
          - unique
      - name: date_day
        data_tests:
          - not_null
          - unique
      - name: year
        data_tests:
          - not_null
      - name: month
        data_tests:
          - not_null
      - name: day
        data_tests:
          - not_null

  - name: fact_order_items
    description: "Fact table at one row per order item."
    columns:
      - name: order_item_id
        data_tests:
          - not_null
          - unique
      - name: order_id
        data_tests:
          - not_null
      - name: date_key
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_dates')
                field: date_key
      - name: customer_key
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_key
      - name: product_key
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_products')
                field: product_key
      - name: quantity
        data_tests:
          - not_null
      - name: unit_price
        data_tests:
          - not_null
      - name: line_total
        data_tests:
          - not_null
      - name: order_status
        data_tests:
          - not_null
      - name: payment_method
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['credit_card', 'debit_card', 'paypal']
      - name: payment_status
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['paid', 'waiting', 'refunded']