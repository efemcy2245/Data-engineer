version: 2

models:
  - name: stg_categories
    description: "Cleaned categories staging view."
    columns:
      - name: category_id
        data_tests:
          - not_null
          - unique
      - name: category_name
        data_tests:
          - not_null

  - name: stg_customers
    description: "Cleaned customers staging view."
    columns:
      - name: customer_id
        data_tests:
          - not_null
          - unique
      - name: first_name
        data_tests:
          - not_null
      - name: last_name
        data_tests:
          - not_null
      - name: email
        data_tests:
          - not_null

  - name: stg_customer_addresses
    description: "Pass-through customer addresses staging view. Column tests deferred until address model is stabilized."

  - name: stg_order_items
    description: "Cleaned order items staging view."
    columns:
      - name: order_item_id
        data_tests:
          - not_null
          - unique
      - name: order_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_orders')
                field: order_id
      - name: product_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_products')
                field: product_id
      - name: quantity
        data_tests:
          - not_null
      - name: unit_price
        data_tests:
          - not_null
      - name: line_total
        data_tests:
          - not_null

  - name: stg_orders
    description: "Cleaned orders staging view."
    columns:
      - name: order_id
        data_tests:
          - not_null
          - unique
      - name: customer_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_customers')
                field: customer_id
      - name: order_date
        data_tests:
          - not_null
      - name: order_status
        data_tests:
          - not_null

  - name: stg_payments
    description: "Cleaned payments staging view."
    columns:
      - name: payment_id
        data_tests:
          - not_null
          - unique
      - name: order_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_orders')
                field: order_id
      - name: payment_date
        data_tests:
          - not_null
      - name: payment_method
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['credit_card', 'debit_card', 'paypal']
      - name: payment_status
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['paid', 'waiting', 'refunded']
      - name: amount
        data_tests:
          - not_null

  - name: stg_products
    description: "Cleaned products staging view."
    columns:
      - name: product_id
        data_tests:
          - not_null
          - unique
      - name: category_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_categories')
                field: category_id
      - name: product_name
        data_tests:
          - not_null
      - name: sku
        data_tests:
          - not_null
      - name: unit_price
        data_tests:
          - not_null